<script>
  // ── Google Apps Script Web App URL ──
  // This single Apps Script handles BOTH trainee fetch AND form submission.
  const SHEET_URL = ' https://script.google.com/macros/s/AKfycbygRjVKy8QjUbre-Np0oAETFq9y6FNqawYZbiJ6z5rSLu_V8ytWevvp_xnK25Ya7L6l/exec';

  // ── Trainee Sheet details ──
  const TRAINEE_SHEET_ID = '1Yn450uce02hgfbXJmRzd9aBY6bBEgaginXOctu--izg';
  const SHEET_CSV_DIRECT = `https://docs.google.com/spreadsheets/d/${TRAINEE_SHEET_ID}/export?format=csv&gid=0`;

  // CORS proxy list — tried in order until one works
  const CORS_PROXIES = [
    url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
    url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    url => `https://cors-anywhere.herokuapp.com/${url}`,
  ];

  // ── Trainee Data Store ──
  let traineeData = {};

  // ── Parse CSV (handles quoted fields with commas inside) ──
  function parseCSV(text) {
    const rows = [];
    const lines = text.split(/\r?\n/);
    for (const line of lines) {
      if (!line.trim()) continue;
      const row = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { row.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      row.push(cur.trim());
      rows.push(row);
    }
    return rows;
  }

  // ── Build dropdown from parsed CSV rows ──
  function populateFromCSV(csvText, sel) {
    const rows = parseCSV(csvText);
    if (rows.length < 2) throw new Error('Sheet has no data rows');

    const headers = rows[0].map(h => String(h).trim().toUpperCase());
    const nameIdx  = headers.findIndex(h => h.includes('NAME'));
    const desigIdx = headers.findIndex(h => h.includes('DESIG'));
    const hqIdx    = headers.findIndex(h => h === 'HQ' || h.includes('H.Q') || h.includes('HEAD'));
    const hrmsIdx  = headers.findIndex(h => h.includes('HRMS'));

    if (nameIdx < 0) throw new Error('NAME column not found in sheet. Check headers.');

    traineeData = {};
    sel.innerHTML = '<option value="">-- Select Trainee Name --</option>';

    // Collect all trainees first, then sort A-Z
    const traineesTemp = [];
    for (let i = 1; i < rows.length; i++) {
      const row  = rows[i];
      const name = String(row[nameIdx] || '').trim().toUpperCase();
      if (!name) continue;
      traineesTemp.push({
        name,
        designation: desigIdx >= 0 ? String(row[desigIdx] || '').trim() : '',
        hq:          hqIdx    >= 0 ? String(row[hqIdx]    || '').trim() : '',
        hrms:        hrmsIdx  >= 0 ? String(row[hrmsIdx]  || '').trim() : '',
      });
    }

    // Sort A-Z by name
    traineesTemp.sort((a, b) => a.name.localeCompare(b.name));

    traineesTemp.forEach(t => {
      traineeData[t.name] = { designation: t.designation, hq: t.hq, hrms: t.hrms };
      const opt = document.createElement('option');
      opt.value = t.name; opt.textContent = t.name;
      sel.appendChild(opt);
    });

    return traineesTemp.length;
  }

  // ── Build dropdown from Apps Script JSON response ──
  function populateFromJSON(trainees, sel) {
    traineeData = {};
    sel.innerHTML = '<option value="">-- Select Trainee Name --</option>';

    // Sort A-Z by name before populating
    const sorted = [...trainees].sort((a, b) =>
      String(a.name || '').trim().toUpperCase().localeCompare(String(b.name || '').trim().toUpperCase())
    );

    sorted.forEach(t => {
      const name = String(t.name || '').trim().toUpperCase();
      if (!name) return;
      traineeData[name] = {
        designation: String(t.designation || '').trim(),
        hq:          String(t.hq          || '').trim(),
        hrms:        String(t.hrms         || '').trim(),
      };
      const opt = document.createElement('option');
      opt.value = name; opt.textContent = name;
      sel.appendChild(opt);
    });
    return sorted.length;
  }

  async function loadTrainees() {
    const sel = document.getElementById('traineeName');
    sel.innerHTML = '<option value="">⏳ Fetching trainees...</option>';
    sel.disabled = true;

    const strategies = [
      // 1️⃣ Apps Script endpoint (most reliable — already has CORS headers)
      async () => {
        const res = await fetch(SHEET_URL + '?action=getTrainees', { signal: AbortSignal.timeout(8000) });
        const data = await res.json();
        if (data.status !== 'success' || !data.trainees?.length) throw new Error(data.message || 'No trainees returned');
        return { count: populateFromJSON(data.trainees, sel), label: 'Apps Script' };
      },
      // 2️⃣ Direct CSV (works if sheet is public)
      async () => {
        const res = await fetch(SHEET_CSV_DIRECT, { signal: AbortSignal.timeout(8000) });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const csv = await res.text();
        return { count: populateFromCSV(csv, sel), label: 'Google Sheets (direct)' };
      },
      // 3️⃣ CORS proxy — allorigins.win
      async () => {
        const url = CORS_PROXIES[0](SHEET_CSV_DIRECT);
        const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (!res.ok) throw new Error('Proxy HTTP ' + res.status);
        const csv = await res.text();
        return { count: populateFromCSV(csv, sel), label: 'allorigins proxy' };
      },
      // 4️⃣ CORS proxy — corsproxy.io
      async () => {
        const url = CORS_PROXIES[1](SHEET_CSV_DIRECT);
        const res = await fetch(url, { signal: AbortSignal.timeout(10000) });
        if (!res.ok) throw new Error('Proxy2 HTTP ' + res.status);
        const csv = await res.text();
        return { count: populateFromCSV(csv, sel), label: 'corsproxy.io' };
      },
    ];

    for (let i = 0; i < strategies.length; i++) {
      try {
        const { count, label } = await strategies[i]();
        sel.disabled = false;
        showToast(`✅ ${count} trainees loaded via ${label}!`, 'success');
        const b = document.getElementById('fixBanner');
        if (b) b.remove();
        return; // success — stop trying
      } catch (err) {
        console.warn(`Strategy ${i + 1} failed:`, err.message);
      }
    }

    // All strategies failed
    sel.innerHTML = '<option value="">⚠️ Could not load trainees</option>';
    sel.disabled = false;
    showToast('❌ All fetch methods failed. See fix instructions below.', 'error');
    showFixBanner();
  }

  function showFixBanner() {
    if (document.getElementById('fixBanner')) return;
    const banner = document.createElement('div');
    banner.id = 'fixBanner';
    banner.style.cssText = 'background:#fff3cd;border:2px solid #ffc107;border-radius:8px;padding:14px 18px;margin:12px 0;font-size:12px;color:#856404;line-height:1.8;';
    banner.innerHTML = `
      <strong>⚠️ Could not fetch trainee data. Fix one of the following:</strong><br>
      <b>Option A (Recommended):</b> In your Google Apps Script, redeploy with <i>Execute as: Me</i> and <i>Who has access: Anyone</i>.<br>
      <b>Option B:</b> Open the Google Sheet → Share → <i>Anyone with the link → Viewer</i> → Save.<br>
      <b>Then click 🔄 Refresh above.</b>
    `;
    document.querySelector('.form-container').prepend(banner);
  }

  function autoFillTrainee(name) {
    const data  = traineeData[name] || {};
    const desig = document.getElementById('designation');
    const hq    = document.getElementById('hq');
    const hrms  = document.getElementById('hrms');

    desig.value = data.designation || '';
    hq.value    = data.hq          || '';
    hrms.value  = data.hrms        || '';

    [desig, hq, hrms].forEach(el => {
      if (el.value) {
        el.setAttribute('readonly', true);
        el.title = 'Auto-filled from Google Sheet';
      } else {
        el.removeAttribute('readonly');
        el.title = '';
      }
    });

    // Visual feedback
    if (name) {
      showToast('✅ Auto-filled: ' + name, 'success');
    }
  }

  document.addEventListener('DOMContentLoaded', loadTrainees);

  let rowCount = 0;

  function addRow() {
    rowCount++;
    const wrap = document.getElementById('entriesWrap');
    const card = document.createElement('div');
    card.className = 'entry-card';
    card.setAttribute('data-entry', rowCount);
    card.innerHTML = `
      <div class="entry-card-head">
        <span class="entry-num">Entry ${rowCount}</span>
        <button class="delete-btn" onclick="this.closest('.entry-card').remove()">✕ Remove</button>
      </div>
      <div class="entry-card-body">
        <div class="entry-grid">
          <div class="entry-field"><label>Date</label><input type="date" name="date"></div>
          <div class="entry-field"><label>Train No.</label><input type="text" name="trainNo"></div>
          <div class="entry-field"><label>Loco No.</label><input type="text" name="locoNo"></div>
          <div class="entry-field"><label>From Station</label><input type="text" name="fromStation"></div>
          <div class="entry-field"><label>Dep. Time</label><input type="text" name="depTime"></div>
          <div class="entry-field"><label>To Station</label><input type="text" name="toStation"></div>
          <div class="entry-field"><label>Arr. Time</label><input type="text" name="arrTime"></div>
          <div class="entry-field"><label>Footplate KM</label><input type="text" name="footplateKm"></div>
          <div class="entry-field"><label>&nbsp;</label><input type="text" style="visibility:hidden"></div>
          <div class="entry-field full"><label>Working LP Name/HQ/CMS ID</label><textarea rows="2" name="lpAlpName"></textarea></div>
          <div class="entry-field full"><label>Remarks if any</label><textarea rows="2" name="itemsDiscussed"></textarea></div>
          <div class="entry-field full" style="display:none;"><label style="display:none;">Name of CC/SM</label><textarea rows="2" name="ccSmName"></textarea></div>
        </div>
      </div>
    `;
    wrap.appendChild(card);
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type;
    t.style.display = 'block';
    setTimeout(() => { t.style.display = 'none'; }, 4000);
  }

  function collectData() {
    const timestamp = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
    const header = {
      timestamp,
      traineeName:  document.getElementById('traineeName').value,
      designation:  document.getElementById('designation').value,
      hq:           document.getElementById('hq').value,
      hrms:         document.getElementById('hrms').value,
      nominatedcli: document.getElementById('nominatedcli').value,
    };
    const entries = [];
    document.querySelectorAll('.entry-card').forEach((card, i) => {
      const get = name => { const el = card.querySelector(`[name="${name}"]`); return el ? el.value : ''; };
      entries.push({
        entryNo:        i + 1,
        date:           get('date'),
        trainNo:        get('trainNo'),
        locoNo:         get('locoNo'),
        fromStation:    get('fromStation'),
        depTime:        get('depTime'),
        toStation:      get('toStation'),
        arrTime:        get('arrTime'),
        footplateKm:    get('footplateKm'),
        lpAlpName:      get('lpAlpName'),
        itemsDiscussed: get('itemsDiscussed'),
        ccSmName:       get('ccSmName'),
      });
    });
    return { header, entries };
  }

  let isSubmitted = false;

  async function handleSubmit() {
    if (isSubmitted) {
      alert('⚠️ DATA ALREADY SUBMITTED');
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Submitting...';

    const payload = collectData();

    try {
      const res = await fetch(SHEET_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      // no-cors returns opaque response, assume success if no network error
      isSubmitted = true;
      btn.textContent = '✅ Submitted';
      btn.style.background = 'linear-gradient(135deg,#7f8c8d,#95a5a6)';
      btn.title = 'Data already submitted';
      showToast('✅ Data submitted to Google Sheet!', 'success');
    } catch (err) {
      showToast('❌ Failed to connect. Check the Web App URL.', 'error');
      btn.disabled = false;
      btn.textContent = '✔ Submit to Google Sheet';
    }
  }

  function generatePDF() {
    const btn = document.getElementById('pdfBtn');
    btn.disabled = true;
    btn.textContent = '⏳ Generating...';

    try {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF({ orientation: 'landscape', unit: 'mm', format: 'a4' });
      const pageW = doc.internal.pageSize.getWidth();
      const margin = 10;

      // ── Header ──
      doc.setFillColor(26, 35, 126);
      doc.rect(0, 0, pageW, 22, 'F');
      doc.setFontSize(14);
      doc.setTextColor(255, 215, 0);
      doc.setFont('helvetica', 'bold');
      doc.text('SOUTH EAST CENTRAL RAILWAY — RAIPUR DIVISION', pageW / 2, 8, { align: 'center' });
      doc.setFontSize(10);
      doc.text('RRB ALP HANDLING REPORT', pageW / 2, 15, { align: 'center' });

      // Timestamp
      const ts = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata' });
      doc.setFontSize(7);
      doc.setTextColor(255, 215, 0);
      doc.text('Generated: ' + ts, pageW - margin, 20, { align: 'right' });

      let y = 28;

      // ── Trainee Details ──
      const td = collectData().header;
      doc.setFillColor(57, 73, 171);
      doc.rect(margin, y, pageW - margin * 2, 7, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text('TRAINEE DETAILS', pageW / 2, y + 5, { align: 'center' });
      y += 10;

      doc.setTextColor(26, 35, 126);
      doc.setFontSize(8);
      doc.setFont('helvetica', 'normal');
      const cols = [
        ['Name of Trainee', td.traineeName],
        ['Designation', td.designation],
        ['HQ', td.hq],
        ['HRMS ID', td.hrms],
        ['Nominated CLI', td.nominatedcli],
      ];
      const colW = (pageW - margin * 2) / 3;
      cols.forEach(([label, val], idx) => {
        const cx = margin + (idx % 3) * colW;
        const cy = y + Math.floor(idx / 3) * 10;
        doc.setFont('helvetica', 'bold');
        doc.text(label + ':', cx, cy);
        doc.setFont('helvetica', 'normal');
        doc.text((val || '').toUpperCase(), cx + 38, cy);
      });
      y += Math.ceil(cols.length / 3) * 10 + 4;

      // ── Entries Table ──
      doc.setFillColor(57, 73, 171);
      doc.rect(margin, y, pageW - margin * 2, 7, 'F');
      doc.setTextColor(255, 255, 255);
      doc.setFontSize(9);
      doc.setFont('helvetica', 'bold');
      doc.text('HANDLING DETAILS', pageW / 2, y + 5, { align: 'center' });
      y += 9;

      const { entries } = collectData();
      const tableHead = [['#', 'Date', 'Train No', 'Loco No', 'From', 'Dep', 'To', 'Arr', 'KM', 'LP/ALP Name & Sign.', 'Items Discussed', 'CC/SM Name']];
      const tableBody = entries.map(e => [
        e.entryNo, e.date, e.trainNo, e.locoNo, e.fromStation, e.depTime,
        e.toStation, e.arrTime, e.footplateKm, e.lpAlpName, e.itemsDiscussed, e.ccSmName
      ]);

      doc.autoTable({
        startY: y,
        head: tableHead,
        body: tableBody,
        margin: { left: margin, right: margin },
        styles: { fontSize: 7, cellPadding: 2, overflow: 'linebreak', textColor: [26, 35, 126] },
        headStyles: { fillColor: [26, 35, 126], textColor: [255, 215, 0], fontStyle: 'bold', halign: 'center' },
        alternateRowStyles: { fillColor: [240, 248, 255] },
        columnStyles: {
          0:  { cellWidth: 6,  halign: 'center' },
          1:  { cellWidth: 18 },
          2:  { cellWidth: 16 },
          3:  { cellWidth: 16 },
          4:  { cellWidth: 18 },
          5:  { cellWidth: 12 },
          6:  { cellWidth: 18 },
          7:  { cellWidth: 12 },
          8:  { cellWidth: 12 },
          9:  { cellWidth: 38 },
          10: { cellWidth: 55 },
          11: { cellWidth: 38 },
        },
      });

      // ── Footer ──
      const pages = doc.internal.getNumberOfPages();
      for (let p = 1; p <= pages; p++) {
        doc.setPage(p);
        doc.setFontSize(7);
        doc.setTextColor(120, 120, 120);
        doc.text('South East Central Railway — Raipur Division | RRB ALP Handling Report', margin, doc.internal.pageSize.getHeight() - 5);
        doc.text(`Page ${p} of ${pages}`, pageW - margin, doc.internal.pageSize.getHeight() - 5, { align: 'right' });
      }

      const trainee = (td.traineeName || 'report').replace(/\s+/g, '_').toLowerCase();
      doc.save(`ALP_Handling_Report_${trainee}_${new Date().toISOString().slice(0,10)}.pdf`);
      showToast('✅ PDF generated and downloaded!', 'success');
    } catch (err) {
      console.error(err);
      showToast('❌ PDF generation failed. Check console.', 'error');
    } finally {
      btn.disabled = false;
      btn.textContent = '⬇ Generate PDF';
    }
  }

  addRow();
</script>
